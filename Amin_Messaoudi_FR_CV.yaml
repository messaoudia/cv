      url: https://malt.fr/profile/aminmessaoudi
      fontawesome_icon: briefcase
  custom_connections:
  sections:
    Présentation:
      - Cloud Data Engineer spécialisé dans les écosystèmes cloud **GCP** et AWS et dans les plateformes Big Data tel que **Databricks**
      - Disponible sous **1 mois**
      # - RenderCV reads a CV written in a YAML file, and generates a PDF with professional typography.
      # - Each section title is arbitrary.
      # - You can choose any of the 9 entry types for each section.
      # - Markdown syntax is supported everywhere. This is **bold**, *italic*, and [link](https://example.com).

    expériences:
      - company: Freelance
        position: GCP Data Engineer + DBT
        date:
        start_date: 2026-02
        end_date: present
        location: Paris, France
        summary: Conception d'un outil d'analyse, d'ingestion et de traitement des données des taxis de New York jusqu'à leur visualisation
        highlights:
          - "Pipeline GCP : [GitHub](https://github.com/messaoudia/nyc-taxi-gcp-pipeline)"
          - "Pipeline DBT : [GitHub⁠](https://github.com/messaoudia/dbt_nyc_taxi_bigquery)"
          - "Déploiement du projet avec Terraform"
          - Mise en place d'un Cloud Run Job pour l'ingestion de données dans Cloud Storage avec envoi de messages sur Pub/Sub
          - Synchronisation des données stockées dans Cloud Storage vers BigQuery en passant par EventArc
          - Analyse des données et mise en place des phases de traitement avec DBT, en suivant l'architecture medallion (staging, intermediate, marts) incluant des tests et mise en place de macros
          - Création et utilisation de divers comptes de service avec le moindre privilège (least privilege)
          - Utilisation de l'emprunt d'identité de comptes de service
          - "Compétences : Cloud Run, Artifact Registry, Cloud Storage, IAM, Secret Manager, Parameter Manager, BigQuery, DBT (DBT Core, tests, staging, marts, macros), EventArc, Pub/Sub, Cloud Scheduler, Workflows, DataForm, Looker"
      - company: Alten
        position: Cloud Data Engineer – Freelance
        date:
        start_date: 2024-06
        end_date: present
        location: Courbevoie, France
        summary: Pilotage d'initiatives d'ingénierie des données au sein du secteur des énergies renouvelables d'un grand groupe français, développement et déploiement de pipelines ETL et de solutions d'IA générative pour automatiser les processus et optimiser l'efficacité opérationnelle afin de répondre aux besoins métiers.
        highlights:
          - Développement, orchestration et déploiement de plus de 10 pipelines ETL et de solutions d'IA générative améliorant l'efficacité opérationnelle dans le secteur des énergies renouvelables
          # - Orchestration de pipelines pour automatiser les processus et améliorer l'expérience utilisateur finale
          - Analyse de milliards de lignes, plusieurs tera et giga, de données énergétiques quasi temps réel pour calculer des indicateurs de performance destinés aux utilisateurs finaux, en utilisant PySpark et Databricks / Dataiku recipes
          - Migration et optimisation de divers scripts PySpark sur Dataiku et EKS vers Databricks pour passer d'un temps d'exécution de 5 heures à 12 minutes (-96%)
          - Migration de scripts PySpark vers Databricks pour une réduction des coûts cloud de 83 € à 1.5 € par run (-98%)
          - Exploitation d'un projet d'IA générative pour automatiser et simplifier un processus permettant aux opérationnels d'économiser environ 6 millions € par an
          - Utilisation d'Azure OpenAI et Document Intelligence pour le traitement jusqu'à 200 fichiers par jour, lecture du contenu des PDFs (plus de 10 formats différents) et Excel, puis conversion en données tabulaires pour analyse via Power BI et aide à la prise de décision par les parties prenantes
          - Déploiement et amélioration d'un système RAG avec optimisation du code, implémentation de fonctionnalités d'appel de fonctions (function calling) et ingénierie de prompts avancés
          - Déploiement de services cloud AWS via **Terraform**, incluant Lambda, CloudWatch, KMS, SNS et Parameter Store
          - Migration d'une pipeline ETL massive de Dataiku vers Databricks pour améliorer fiabilité, vitesse et maintenabilité
          - Administration de Databricks via la création de Bundles, Catalogs, External Locations, Clusters, et mise en œuvre d'une gouvernance avec privilèges minimum pour les utilisateurs
          - Homogénéisation des environnements de travail pour augmenter la vélocité de l'équipe (centraliser les scripts sur Github, conversion de code NodeJS en Python, centralisation de la documentation sur Confluence)
          - Animation de rétrospectives pour favoriser la croissance et la maturité technique de l'équipe
          - "Compétences : ETL, Python, Terraform, PySpark, Databricks, Dataiku, IA générative, AWS, Azure IA"
      - company: Le Wagon
        position: Assistant Enseignant – Data Engineer
        date:
        start_date: 2024-06
        end_date: 2024-09
        location: Remote
        summary: Accompagnement pédagogique d'une classe de 8-10 étudiants internationaux pour maîtriser les concepts clés d'outils essentiels tels qu'Apache Airflow, Apache Spark, divers outils GCP
        highlights:
          - Accompagnement des étudiants dans la résolution d'exercices pratiques et renforcement de leurs compétences techniques
          - Contribution active au dépôt GitHub de Le Wagon pour améliorer les exercices, les consignes pédagogiques et les solutions proposées
      - company: Clustaar
        position: NLP Engineer - Data Engineer
        date:
        start_date: 2018-09
        end_date: 2023-09
        location: Paris, France
        summary: Amélioration et supervision d'un moteur NLP développé en interne
        highlights:
          - Développement de divers chatbots personnalisés à partir de bases documentaires clients
          - Recherche de publications académiques pour améliorer les capacités des chatbots et optimiser la précision des modèles NLP
          - Développement d'un job GCP Kubernetes permettant d'entrainer un modèle ElasticSearch à chaque entrainement du modèle NLP avec backup des données sur Cloud Storage
          - Développement et entraînement d'un moteur d'auto-complétion sur des données clients pour faciliter l'utilisation des chatbots via Elasticsearch Completion Suggester entrainant un gain de matching (~20%)
          - Monitoring de job, pods sur Kubernetes
          - Mise en place d'alerting sur Sentry
          - Développement et maintenance de librairies PyPI privées, avec PyScaffold, pour une utilisation en interne sur divers outils
          - Mise en place de différentes tests unitaires avec mocking avancé
          - Amélioration d'un outil de contrôle de qualité automatique du moteur NLP après chaque mise à jour pour détecter les régressions
          - Développement d'endpoints backend pour un outil SEO afin de faciliter la mise en place de rapports d'amélioration de référence aux consultants pour leurs clients
          - Développement d'API backend, avec mise en place de schéma strict, pour un outil SEO permettant aux consultants de générer des rapports d'amélioration de référencement pour leurs clients, avec extraction de ranking Google, position p0 et d'autres indicateurs clés de performance
          - Formation des clients et des équipes internes pour les aider à comprendre le fonctionnement du moteur NLP et les méthodes d'amélioration
          - "Compétences : GCP, Python, NLP, Pandas, Kubernetes, MongoDB, PostgreSQL, Elasticsearch, Elastic Cloud, Sentry"
      - company: Clustaar
        position: NLP Engineer - Data Engineer (Intern)
        date:
        start_date: 2018-03
