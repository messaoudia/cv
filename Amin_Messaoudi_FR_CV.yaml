    - Avril
    - Mai
    - Juin
    - Juillet
    - Août
    - Septembre
    - Octobre
    - Novembre
    - Décembre
settings:
  current_date: today
  render_command:
    output_folder: rendercv_output
    design:
    locale:
    typst_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_${LANGUAGE_CODE}_CV.typ
    pdf_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_${LANGUAGE_CODE}_CV.pdf
    markdown_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_${LANGUAGE_CODE}_CV.md
    html_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_${LANGUAGE_CODE}_CV.html
    png_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_${LANGUAGE_CODE}_CV.png
    dont_generate_markdown: false
    dont_generate_html: true
    dont_generate_typst: false
    dont_generate_pdf: false
    dont_generate_png: true
  bold_keywords: []
  pdf_title: NAME - CV
